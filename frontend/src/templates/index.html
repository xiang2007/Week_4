<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Manager Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    {% raw %}
    const { useEffect, useMemo, useRef, useState } = React;

    const DEFAULT_TAX_RELIEF_CATEGORIES = [
      { key: "education", label: "Education", limit: 7000, color: "#156F67" },
      { key: "book_resources", label: "Book & Educational Resources", limit: 1000, color: "#C7772E" },
      { key: "it_equipment", label: "IT Equipment / Devices", limit: 3000, color: "#416D94" },
      { key: "medical", label: "Medical Expenses", limit: 15000, color: "#8B5E34" },
      { key: "selfemployed", label: "Self-Employed / Professional Fees", limit: 2500, color: "#6C5A94" },
      { key: "insurance", label: "Insurance Premiums", limit: 3000, color: "#357C8A" },
      { key: "life_insurance", label: "Life Insurance", limit: 3000, color: "#8B4B55" },
      { key: "retirement", label: "Retirement Contributions (CPF/EWK)", limit: Infinity, color: "#4B6F44" },
      { key: "healthcare", label: "Healthcare", limit: 3000, color: "#9A6A2D" },
      { key: "renewable_energy", label: "Renewable Energy Equipment", limit: 800, color: "#557A38" },
      { key: "residential", label: "Residential Accommodation", limit: 2500, color: "#7B6A55" },
    ];
    let TAX_RELIEF_CATEGORIES = DEFAULT_TAX_RELIEF_CATEGORIES;

    const Icon = ({ name, size = 18 }) => <i data-lucide={name} style={{ width: size, height: size }} aria-hidden="true"></i>;
    const fmt = value => 'RM ' + Number(value || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const MAX_RECEIPT_AMOUNT = 100000;
    const MIN_RECEIPT_AMOUNT = 0.01;
    const MAX_ANNUAL_INCOME = 1000000000000;
    const todayIso = () => new Date().toISOString().slice(0, 10);
    const categoryByKey = key => TAX_RELIEF_CATEGORIES.find(c => c.key === key);
    function guessCategoryKey(text) {
      const lowered = String(text || '').toLowerCase();
      let bestKey = '';
      let bestScore = 0;
      TAX_RELIEF_CATEGORIES.forEach(category => {
        const score = (category.keywords || []).reduce((total, keyword) => {
          if (!lowered.includes(String(keyword).toLowerCase())) return total;
          return total + (String(keyword).includes(' ') ? 2 : 1);
        }, 0);
        if (score > bestScore) {
          bestKey = category.key;
          bestScore = score;
        }
      });
      return bestKey;
    }
    const plainChatText = text => String(text || '')
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/__(.*?)__/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/_(.*?)_/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/^\s*[-*]\s+/gm, '')
      .replace(/^\s*\d+\.\s+/gm, '')
      .trim();
    const RESIDENT_TAX_BRACKETS = [
      { upTo: 5000, base: 0, rate: 0 },
      { upTo: 20000, base: 0, rate: 0.01 },
      { upTo: 35000, base: 150, rate: 0.03 },
      { upTo: 50000, base: 600, rate: 0.06 },
      { upTo: 70000, base: 1500, rate: 0.11 },
      { upTo: 100000, base: 3700, rate: 0.19 },
      { upTo: 400000, base: 9400, rate: 0.25 },
      { upTo: 600000, base: 84400, rate: 0.26 },
      { upTo: 2000000, base: 136400, rate: 0.28 },
      { upTo: Infinity, base: 528400, rate: 0.30 },
    ];

    function estimateResidentTax(chargeableIncome) {
      if (chargeableIncome <= 0) return 0;
      let lowerBound = 0;
      for (const bracket of RESIDENT_TAX_BRACKETS) {
        if (chargeableIncome <= bracket.upTo) {
          return bracket.base + ((chargeableIncome - lowerBound) * bracket.rate);
        }
        lowerBound = bracket.upTo;
      }
      return 0;
    }

    async function readJson(resp) {
      const text = await resp.text();
      try {
        return text ? JSON.parse(text) : {};
      } catch {
        if (!resp.ok) return { detail: text || `Server responded with ${resp.status}` };
        throw new Error(text || 'Invalid server response');
      }
    }

    function calculateClaimTotals(receipts) {
      const grouped = new Map();
      receipts.forEach(r => {
        const amount = Number(r.amount || 0);
        if (amount < MIN_RECEIPT_AMOUNT || amount > MAX_RECEIPT_AMOUNT) return;
        grouped.set(r.categoryKey, (grouped.get(r.categoryKey) || 0) + amount);
      });
      const categories = [];
      let total = 0;
      for (const [key, amount] of grouped.entries()) {
        const cat = categoryByKey(key);
        if (!cat) continue;
        const claimable = cat.limit === Infinity ? amount : Math.min(amount, cat.limit);
        total += claimable;
        categories.push({ ...cat, amount, claimable });
      }
      return { total, categories };
    }

    function receiptFingerprint(r) {
      return [(r.title || '').trim().toLowerCase(), r.receiptDate || '', Number(r.amount || 0).toFixed(2), r.categoryKey || ''].join('|');
    }

    function duplicateGroups(receipts) {
      const groups = new Map();
      receipts.forEach(r => {
        const key = receiptFingerprint(r);
        groups.set(key, [...(groups.get(key) || []), r]);
      });
      return [...groups.values()].filter(group => group.length > 1);
    }

    function App() {
      const [accountName, setAccountName] = useState('');
      const [sessionChecked, setSessionChecked] = useState(false);
      const [authMode, setAuthMode] = useState('login');
      const [authError, setAuthError] = useState('');
      const [receipts, setReceipts] = useState([]);
      const [pendingId, setPendingId] = useState(1);
      const [view, setView] = useState('dashboard');
      const [annualIncome, setAnnualIncome] = useState(Number(localStorage.getItem('receiptManagerAnnualIncome') || 0));
      const [taxRebateAmount, setTaxRebateAmount] = useState(Number(localStorage.getItem('receiptManagerTaxRebateAmount') || 0));
      const [filters, setFilters] = useState({ query: '', category: '', from: '', to: '' });
      const [savingIds, setSavingIds] = useState([]);
      const [savingAll, setSavingAll] = useState(false);
      const [extractingIds, setExtractingIds] = useState([]);
      const [ocrEnabled, setOcrEnabledState] = useState(localStorage.getItem('receiptManagerOcrEnabled') !== 'false');
      const [ocrConfig, setOcrConfig] = useState({ provider: 'gemini', label: 'Gemini Vision', enabled: true });
      const [taxCategories, setTaxCategories] = useState(DEFAULT_TAX_RELIEF_CATEGORIES);
      const [summary, setSummary] = useState({ headline: 'No receipts yet', overview: 'Upload receipts to build a timeline.', timeline: [], cached: true, status: 'Ready' });
      const [taxPlan, setTaxPlan] = useState({ total_claimed: 0, total_remaining: 0, categories: [] });
      const [taxPlanStatus, setTaxPlanStatus] = useState('Ready');
      const [chatOpen, setChatOpen] = useState(false);
      const [chatBusy, setChatBusy] = useState(false);
      const [messages, setMessages] = useState([{ type: 'ai', text: 'Hi, I can help review your receipt claims, category limits, and next best action. I am not a licensed financial advisor.' }]);
      const [toast, setToast] = useState('');
      const [preview, setPreview] = useState('');

      const authenticated = Boolean(accountName);
      const confirmed = receipts.filter(r => r.confirmed);
      const pending = receipts.filter(r => !r.confirmed);
      const claims = useMemo(() => calculateClaimTotals(confirmed), [confirmed, taxCategories]);
      const duplicates = useMemo(() => duplicateGroups(confirmed), [confirmed]);
      const pendingReviewCount = pending.filter(r => r.needsReview || !r.amount || r.amount < MIN_RECEIPT_AMOUNT || r.amount > MAX_RECEIPT_AMOUNT || !r.categoryKey).length;
      const visibleReceipts = useMemo(() => {
        const q = filters.query.toLowerCase();
        return confirmed.filter(r => {
          const cat = categoryByKey(r.categoryKey);
          const haystack = `${r.title} ${r.filename} ${cat ? cat.label : ''}`.toLowerCase();
          if (q && !haystack.includes(q)) return false;
          if (filters.category && r.categoryKey !== filters.category) return false;
          if (filters.from && r.receiptDate < filters.from) return false;
          if (filters.to && r.receiptDate > filters.to) return false;
          return true;
        });
      }, [confirmed, filters, taxCategories]);

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      });

      useEffect(() => {
        if (toast) {
          const timer = window.setTimeout(() => setToast(''), 2600);
          return () => window.clearTimeout(timer);
        }
      }, [toast]);

      useEffect(() => {
        localStorage.setItem('receiptManagerAnnualIncome', String(annualIncome || 0));
      }, [annualIncome]);

      useEffect(() => {
        localStorage.setItem('receiptManagerTaxRebateAmount', String(taxRebateAmount || 0));
      }, [taxRebateAmount]);

      useEffect(() => {
        loadCategories();
        restoreSession();
      }, []);

      useEffect(() => {
        loadTaxPlan();
      }, [receipts]);

      async function restoreSession() {
        try {
          const resp = await fetch('/auth/me');
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || 'Login required');
          setAuthenticated(data.account_name);
          await loadReceipts();
        } catch {
          setAccountName('');
        } finally {
          setSessionChecked(true);
        }
      }

      function setAuthenticated(nextAccount) {
        setAccountName(nextAccount);
      }

      async function loadCategories() {
        try {
          const resp = await fetch('/categories');
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          const categories = (data.categories || []).map(cat => ({
            ...cat,
            limit: cat.limit === null || cat.limit === undefined ? Infinity : Number(cat.limit),
            keywords: cat.keywords || [],
          })).filter(cat => cat.key && cat.label);
          if (categories.length) {
            TAX_RELIEF_CATEGORIES = categories;
            setTaxCategories(categories);
          }
        } catch {
          TAX_RELIEF_CATEGORIES = DEFAULT_TAX_RELIEF_CATEGORIES;
          setTaxCategories(DEFAULT_TAX_RELIEF_CATEGORIES);
        }
      }

      async function clearAuthenticated() {
        try {
          await fetch('/auth/logout', { method: 'POST' });
        } catch {}
        setAccountName('');
        setReceipts([]);
        setView('dashboard');
        setChatOpen(false);
      }

      async function loadReceipts() {
        const resp = await fetch('/receipts');
        const data = await readJson(resp);
        if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
        setReceipts((data.receipts || []).map(r => ({
          id: r.id,
          receiptNumber: r.receipt_number,
          title: r.title || `Receipt ${r.receipt_number}`,
          receiptDate: r.receipt_date || (r.created_at || '').slice(0, 10),
          imageDataUrl: r.image_data_url || '',
          filename: r.filename || `receipt-${r.receipt_number}`,
          categoryKey: r.category_key,
          amount: Number(r.amount),
          confirmed: true,
          needsReview: false,
        })));
        loadOcrConfig();
        loadAiSummary();
        loadTaxPlan(true);
      }

      async function loadOcrConfig() {
        try {
          const resp = await fetch('/ocr-config');
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setOcrConfig(data);
          if (!data.enabled) setOcrEnabled(false);
        } catch {
          setOcrConfig({ provider: 'gemini', label: 'Gemini Vision', enabled: true });
        }
      }

      async function loadAiSummary() {
        setSummary(s => ({ ...s, status: 'Updating' }));
        try {
          const resp = await fetch('/ai-summary');
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setSummary({
            headline: data.headline || 'Receipt summary',
            overview: data.overview || '',
            timeline: data.timeline || [],
            cached: Boolean(data.cached),
            status: 'Receipt data',
          });
        } catch (err) {
          setSummary({ headline: 'Summary unavailable', overview: err.message, timeline: [], cached: true, status: 'Offline' });
        }
      }

      async function loadTaxPlan(useSession = authenticated) {
        const receiptItems = confirmed.map(r => ({ categoryKey: r.categoryKey, amount: Number(r.amount || 0) }));
        setTaxPlanStatus('Updating');
        try {
          const resp = useSession
            ? await fetch('/tax-summary', { method: 'POST' })
            : await fetch('/tax-summary', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ receipts: receiptItems }),
            });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setTaxPlan(data);
          setTaxPlanStatus('Ready');
        } catch (err) {
          setTaxPlan({ total_claimed: 0, total_remaining: 0, categories: [] });
          setTaxPlanStatus(err.message);
        }
      }

      function setOcrEnabled(value) {
        setOcrEnabledState(value);
        localStorage.setItem('receiptManagerOcrEnabled', value ? 'true' : 'false');
      }

      async function handleAuth(event) {
        event.preventDefault();
        setAuthError('');
        const form = new FormData(event.currentTarget);
        try {
          const resp = await fetch(`/auth/${authMode}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ accountName: form.get('accountName').trim(), password: form.get('password') }),
          });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || 'Authentication failed');
          setAuthenticated(data.account_name);
          event.currentTarget.reset();
          await loadReceipts();
        } catch (err) {
          setAuthError(err.message);
        }
      }

      function updateReceipt(id, changes) {
        setReceipts(items => items.map(r => r.id === id ? { ...r, ...changes } : r));
      }

      function validatePending(ids, source = receipts) {
        const invalid = source.find(r => ids.includes(r.id) && !r.confirmed && (!r.amount || r.amount < MIN_RECEIPT_AMOUNT || r.amount > MAX_RECEIPT_AMOUNT || !r.categoryKey));
        if (invalid) {
          const node = document.querySelector(`[data-pending-card="${invalid.id}"]`);
          node?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setToast(invalid.amount > MAX_RECEIPT_AMOUNT ? `Receipt amount must be ${fmt(MAX_RECEIPT_AMOUNT)} or less.` : 'Amount must be at least RM 0.01 and category must be selected.');
          return false;
        }
        return true;
      }

      function defaultTitle(categoryKey) {
        const cat = categoryByKey(categoryKey);
        const count = confirmed.filter(r => r.categoryKey === categoryKey).length + 1;
        return `Receipt ${cat ? cat.label : 'Claim'} ${count}`;
      }

      function receiptPayload(r) {
        return {
          receiptNumber: String(Date.now()) + '-' + Math.abs(r.id),
          title: r.title || defaultTitle(r.categoryKey),
          receiptDate: r.receiptDate || todayIso(),
          amount: Number(r.amount || 0),
          categoryKey: r.categoryKey,
          filename: r.filename,
          imageDataUrl: r.imageDataUrl,
          rawText: r.rawText || '',
          extractionProvider: r.extractionProvider || '',
          extractionConfidence: r.extractionConfidence == null ? null : Number(r.extractionConfidence || 0),
          extractionMessage: r.extractionMessage || '',
          needsReview: Boolean(r.needsReview),
        };
      }

      async function refineReceiptsWithAi(sourceReceipts, message) {
        if (ocrConfig.provider !== 'google_vision' || !sourceReceipts.some(r => (r.rawText || '').trim())) {
          return sourceReceipts;
        }

        setToast(message);
        const parseResp = await fetch('/receipts/parse-batch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            receipts: sourceReceipts.map(r => ({
              id: r.id,
              title: r.title || '',
              receiptDate: r.receiptDate || '',
              amount: Number(r.amount || 0),
              categoryKey: r.categoryKey || '',
              rawText: r.rawText || '',
            })),
          }),
        });
        const parseData = await readJson(parseResp);
        if (!parseResp.ok) {
          setToast(parseData.detail || 'Gemini parsing failed. Review receipts manually.');
          return sourceReceipts;
        }

        const parsedById = new Map((parseData.receipts || []).map(item => [item.id, item]));
        const refined = sourceReceipts.map(r => {
          const parsed = parsedById.get(r.id);
          if (!parsed) return r;
          return {
            ...r,
            title: parsed.title || r.title,
            receiptDate: parsed.receiptDate || r.receiptDate,
            amount: Number(parsed.amount || r.amount || 0),
            categoryKey: parsed.categoryKey || r.categoryKey,
            needsReview: Boolean(parsed.needsReview || !parsed.amount || !parsed.categoryKey || (parsed.confidence || 0) < 0.7),
            extractionMessage: parsed.message || r.extractionMessage || '',
            extractionProvider: parsed.provider || r.extractionProvider,
            extractionConfidence: Number(parsed.confidence || r.extractionConfidence || 0),
          };
        });
        setReceipts(items => items.map(item => refined.find(r => r.id === item.id) || item));
        return refined;
      }

      async function refineReceiptAfterGoogleVision(receipt, extractedData) {
        const rawText = extractedData.rawText || receipt.rawText || '';
        if (ocrConfig.provider !== 'google_vision' || !rawText.trim()) {
          return extractedData;
        }

        const guessedCategoryKey = guessCategoryKey(`${extractedData.title || ''} ${rawText} ${receipt.filename || ''}`);
        const sourceReceipt = {
          ...receipt,
          title: extractedData.title || receipt.title,
          receiptDate: extractedData.receiptDate || receipt.receiptDate,
          amount: Number(extractedData.amount || receipt.amount || 0),
          categoryKey: extractedData.categoryKey || receipt.categoryKey || guessedCategoryKey,
          rawText,
        };
        const refinedReceipt = (await refineReceiptsWithAi([sourceReceipt], 'Using Gemini to refine Google Vision OCR...'))[0];
        return {
          ...extractedData,
          title: refinedReceipt.title || extractedData.title,
          receiptDate: refinedReceipt.receiptDate || extractedData.receiptDate,
          amount: Number(refinedReceipt.amount || extractedData.amount || 0),
          categoryKey: refinedReceipt.categoryKey || extractedData.categoryKey || guessedCategoryKey,
          needsReview: refinedReceipt.needsReview,
          message: refinedReceipt.extractionMessage || extractedData.message || '',
          provider: refinedReceipt.extractionProvider || extractedData.provider || 'google_vision',
          confidence: Number(refinedReceipt.extractionConfidence || extractedData.confidence || 0),
          rawText,
        };
      }

      async function confirmReceipt(id) {
        if (savingIds.includes(id)) return;
        const r = receipts.find(item => item.id === id);
        if (!r) return;
        setSavingIds(ids => [...ids, id]);
        try {
          const refinedReceipt = (await refineReceiptsWithAi([r], 'Auto-filling category with Gemini...'))[0];
          if (!validatePending([id], [refinedReceipt])) return;
          const payload = receiptPayload(refinedReceipt);
          const resp = await fetch('/receipts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setReceipts(items => items.map(item => item.id === id ? {
            ...item,
            id: data.id,
            title: data.title || payload.title,
            receiptDate: data.receipt_date || payload.receiptDate,
            amount: payload.amount,
            categoryKey: payload.categoryKey,
            confirmed: true,
            needsReview: false,
          } : item));
          setToast('Receipt saved successfully.');
          loadAiSummary();
        } catch (err) {
          alert(`Failed to save receipt: ${err.message}`);
        } finally {
          setSavingIds(ids => ids.filter(value => value !== id));
        }
      }

      async function saveAllPending() {
        const ids = pending.map(r => r.id);
        if (!ids.length || savingAll) return;
        setSavingAll(true);
        setSavingIds(ids);
        try {
          const receiptsToSave = await refineReceiptsWithAi(pending, 'Auto-filling categories with one Gemini batch request...');
          if (!validatePending(ids, receiptsToSave)) return;
          const payloads = receiptsToSave.map(receiptPayload);
          const resp = await fetch('/receipts/batch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ receipts: payloads }),
          });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          const saved = data.receipts || [];
          setReceipts(items => items.map(item => {
            const index = receiptsToSave.findIndex(r => r.id === item.id);
            if (index === -1) return item;
            const payload = payloads[index];
            return {
              ...item,
              id: saved[index]?.id || item.id,
              title: saved[index]?.title || payload.title,
              receiptDate: saved[index]?.receipt_date || payload.receiptDate,
              amount: payload.amount,
              categoryKey: payload.categoryKey,
              confirmed: true,
              needsReview: false,
            };
          }));
          setToast(`${saved.length} receipts saved successfully.`);
          loadAiSummary();
        } catch (err) {
          alert(`Failed to save receipts: ${err.message}`);
        } finally {
          setSavingAll(false);
          setSavingIds([]);
        }
      }

      async function readReceiptOcrData(receipt) {
        const resp = await fetch('/receipts/extract', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageDataUrl: receipt.imageDataUrl }),
        });
        const data = await readJson(resp);
        if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
        return data;
      }

      function mergeReceiptExtraction(receipt, extractedData) {
        const guessedCategoryKey = guessCategoryKey(`${extractedData.title || ''} ${extractedData.rawText || ''} ${receipt.filename || ''}`);
        return {
          ...receipt,
          title: extractedData.title || receipt.title,
          receiptDate: extractedData.receiptDate || receipt.receiptDate,
          amount: Number(extractedData.amount || receipt.amount || 0),
          categoryKey: extractedData.categoryKey || receipt.categoryKey || guessedCategoryKey,
          needsReview: Boolean(extractedData.needsReview || !extractedData.amount || !(extractedData.categoryKey || receipt.categoryKey || guessedCategoryKey) || (extractedData.confidence || 0) < 0.7),
          extractionMessage: extractedData.message || '',
          extractionProvider: extractedData.provider || ocrConfig.provider,
          extractionConfidence: Number(extractedData.confidence || receipt.extractionConfidence || 0),
          rawText: extractedData.rawText || receipt.rawText || '',
        };
      }

      async function extractPendingReceipt(receipt) {
        setExtractingIds(ids => [...ids, receipt.id]);
        try {
          const data = await readReceiptOcrData(receipt);
          const refinedData = await refineReceiptAfterGoogleVision(receipt, data);
          updateReceipt(receipt.id, mergeReceiptExtraction(receipt, refinedData));
        } catch {
          updateReceipt(receipt.id, { needsReview: true, extractionMessage: 'Receipt extraction failed. Fill in the fields manually.' });
        } finally {
          setExtractingIds(ids => ids.filter(id => id !== receipt.id));
        }
      }

      async function rescanPendingReceipts() {
        const receiptsToScan = pending.filter(r => r.imageDataUrl && !extractingIds.includes(r.id));
        if (!receiptsToScan.length || !ocrEnabled || !ocrConfig.enabled) return;
        const ids = receiptsToScan.map(r => r.id);
        setExtractingIds(current => [...new Set([...current, ...ids])]);
        setToast(`Reading ${receiptsToScan.length} receipt${receiptsToScan.length === 1 ? '' : 's'} with Google Vision...`);
        try {
          const scanned = await Promise.all(receiptsToScan.map(async receipt => {
            try {
              const data = await readReceiptOcrData(receipt);
              return mergeReceiptExtraction(receipt, data);
            } catch {
              return {
                ...receipt,
                needsReview: true,
                extractionMessage: 'Receipt extraction failed. Fill in the fields manually.',
              };
            }
          }));
          setReceipts(items => items.map(item => scanned.find(r => r.id === item.id) || item));

          const receiptsWithText = scanned.filter(r => (r.rawText || '').trim());
          if (receiptsWithText.length) {
            await refineReceiptsWithAi(receiptsWithText, `Sending ${receiptsWithText.length} OCR result${receiptsWithText.length === 1 ? '' : 's'} to Gemini in one batch...`);
          }
          setToast('Receipt rescan complete.');
        } finally {
          setExtractingIds(current => current.filter(id => !ids.includes(id)));
        }
      }

      function autoCategorizePendingReceipts() {
        let updatedCount = 0;
        setReceipts(items => items.map(receipt => {
          if (receipt.confirmed || receipt.categoryKey) return receipt;
          const categoryKey = guessCategoryKey(`${receipt.title || ''} ${receipt.rawText || ''} ${receipt.filename || ''}`);
          if (!categoryKey) return receipt;
          updatedCount += 1;
          return {
            ...receipt,
            categoryKey,
            needsReview: Boolean(!receipt.amount || !receipt.receiptDate),
          };
        }));
        setToast(updatedCount ? `Auto-categorized ${updatedCount} receipt${updatedCount === 1 ? '' : 's'}.` : 'No category matches found.');
      }

      function handleFiles(files) {
        [...files].forEach(file => {
          if (!file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = event => {
            setPendingId(current => {
              const receipt = {
                id: current * -1,
                title: '',
                receiptDate: '',
                imageDataUrl: event.target.result,
                filename: file.name,
                categoryKey: guessCategoryKey(file.name),
                amount: 0,
                confirmed: false,
                needsReview: true,
                rawText: '',
              };
              setReceipts(items => [...items, receipt]);
              setView('upload');
              if (ocrEnabled && ocrConfig.enabled) window.setTimeout(() => extractPendingReceipt(receipt), 0);
              return current + 1;
            });
          };
          reader.readAsDataURL(file);
        });
      }

      async function deleteReceipt(id) {
        try {
          const resp = await fetch(`/receipts/${id}`, { method: 'DELETE' });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setReceipts(items => items.filter(r => r.id !== id));
          loadAiSummary();
        } catch (err) {
          alert(`Failed to delete receipt: ${err.message}`);
        }
      }

      function exportCsv() {
        if (!visibleReceipts.length) {
          setToast('Upload and save at least one receipt before exporting CSV.');
          return;
        }
        const rows = [['Title', 'Date', 'Category', 'Amount', 'Filename']];
        visibleReceipts.forEach(r => {
          const cat = categoryByKey(r.categoryKey);
          rows.push([r.title, r.receiptDate, cat ? cat.label : '', Number(r.amount || 0).toFixed(2), r.filename]);
        });
        const csv = rows.map(row => row.map(value => `"${String(value ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
        const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        const a = document.createElement('a');
        a.href = url;
        a.download = 'receipts.csv';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      async function generatePdf() {
        const withImages = confirmed.filter(r => r.imageDataUrl);
        if (!withImages.length) {
          setToast('Upload at least one receipt image first.');
          return;
        }
        try {
          const formData = new FormData();
          for (const r of withImages) {
            const res = await fetch(r.imageDataUrl);
            formData.append('files', await res.blob(), r.filename);
          }
          const resp = await fetch('/convert-pdf', { method: 'POST', body: formData });
          if (!resp.ok) throw new Error(`Server responded with ${resp.status}`);
          const url = URL.createObjectURL(await resp.blob());
          const a = document.createElement('a');
          a.href = url;
          a.download = 'tax_receipts.pdf';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          setToast('PDF download started.');
        } catch (err) {
          setToast(`Failed to generate PDF: ${err.message}`);
        }
      }

      async function askAdvisor(message) {
        setMessages(items => [...items, { type: 'user', text: message }]);
        setChatBusy(true);
        try {
          const resp = await fetch('/ai-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message }),
          });
          const data = await readJson(resp);
          if (!resp.ok) throw new Error(data.detail || `Server responded with ${resp.status}`);
          setMessages(items => [...items, { type: 'ai', text: plainChatText(data.reply || 'I could not generate a reply.') }]);
        } catch (err) {
          setMessages(items => [...items, { type: 'ai', text: err.message }]);
        } finally {
          setChatBusy(false);
        }
      }

      if (!sessionChecked) {
        return null;
      }

      if (!authenticated) {
        return <AuthScreen authMode={authMode} setAuthMode={setAuthMode} authError={authError} onSubmit={handleAuth} />;
      }

      return (
        <>
          <nav className="navbar">
            <a href="/" className="navbar-brand"><span className="mark">RM</span>Receipt Manager</a>
            <div className="navbar-links">
              <span className="user-chip" style={{ display: 'inline-flex' }}>
                <span>{accountName}</span>
                <button className="btn btn-outline btn-sm" onClick={clearAuthenticated} type="button">Logout</button>
              </span>
            </div>
          </nav>
          <main className="app-shell react-shell" style={{ display: 'block' }}>
            {view === 'dashboard' ? (
              <Dashboard
                claims={claims}
                confirmed={confirmed}
                visibleReceipts={visibleReceipts}
                filters={filters}
                setFilters={setFilters}
                duplicates={duplicates}
                pendingReviewCount={pendingReviewCount}
                summary={summary}
                exportCsv={exportCsv}
                generatePdf={generatePdf}
                deleteReceipt={deleteReceipt}
                openUpload={() => setView('upload')}
                setChatOpen={setChatOpen}
                askAdvisor={askAdvisor}
                openPreview={setPreview}
                openPlanner={() => setView('planner')}
                openUpload={() => setView('upload')}
              />
            ) : view === 'planner' ? (
              <TaxPlanner
                annualIncome={annualIncome}
                setAnnualIncome={setAnnualIncome}
                taxRebateAmount={taxRebateAmount}
                setTaxRebateAmount={setTaxRebateAmount}
                taxPlan={taxPlan}
                taxPlanStatus={taxPlanStatus}
                showDashboard={() => setView('dashboard')}
              />
            ) : (
              <UploadView
                pending={pending}
                extractingIds={extractingIds}
                savingIds={savingIds}
                savingAll={savingAll}
                ocrEnabled={ocrEnabled}
                ocrConfig={ocrConfig}
                setOcrEnabled={setOcrEnabled}
                confirmed={confirmed}
                updateReceipt={updateReceipt}
                removePending={id => setReceipts(items => items.filter(r => r.id !== id))}
                confirmReceipt={confirmReceipt}
                saveAllPending={saveAllPending}
                rescanPendingReceipts={rescanPendingReceipts}
                autoCategorizePendingReceipts={autoCategorizePendingReceipts}
                handleFiles={handleFiles}
                openPreview={setPreview}
                showDashboard={() => setView('dashboard')}
              />
            )}
            {view === 'dashboard' && <button className="fab" onClick={() => setView('upload')} type="button" aria-label="Open upload section"><Icon name="plus" size={26} /></button>}
          </main>
          <AdvisorChat open={chatOpen} setOpen={setChatOpen} messages={messages} busy={chatBusy} onAsk={askAdvisor} />
          {preview && <ImageModal src={preview} close={() => setPreview('')} />}
          <div className={`toast ${toast ? 'visible' : ''}`} role="status" aria-live="polite">{toast}</div>
        </>
      );
    }

    function AuthScreen({ authMode, setAuthMode, authError, onSubmit }) {
      return (
        <>
          <nav className="navbar">
            <a href="/" className="navbar-brand"><span className="mark">RM</span>Receipt Manager</a>
          </nav>
          <section className="auth-panel">
            <h1>Welcome back</h1>
            <p>Log in to manage receipts, claim limits, AI summaries, and exports.</p>
            <div className="auth-tabs" role="tablist">
              <button className={`auth-tab ${authMode === 'login' ? 'active' : ''}`} onClick={() => setAuthMode('login')} type="button">Login</button>
              <button className={`auth-tab ${authMode === 'signup' ? 'active' : ''}`} onClick={() => setAuthMode('signup')} type="button">Sign up</button>
            </div>
            <form className="auth-form" onSubmit={onSubmit}>
              <div className="field">
                <label htmlFor="account-name">Account name</label>
                <input id="account-name" name="accountName" autoComplete="username" required minLength="3" maxLength="40" />
              </div>
              <div className="field">
                <label htmlFor="account-password">Password</label>
                <input id="account-password" name="password" type="password" autoComplete={authMode === 'login' ? 'current-password' : 'new-password'} required minLength="6" />
              </div>
              {authError && <div className="error-msg" style={{ display: 'block' }}>{authError}</div>}
              <button className="btn btn-primary" type="submit">{authMode === 'login' ? 'Login' : 'Create account'}</button>
            </form>
          </section>
        </>
      );
    }

    function Dashboard(props) {
      const { claims, confirmed, visibleReceipts, filters, setFilters, duplicates, pendingReviewCount, summary, exportCsv, generatePdf, deleteReceipt, openUpload, openPlanner, setChatOpen, askAdvisor, openPreview } = props;
      const reviewTotal = pendingReviewCount + duplicates.length;
      return (
        <section className="dashboard-section">
          <div className="dashboard-head">
            <div>
              <p className="eyebrow">Claims dashboard</p>
              <h1>Tax claims command center</h1>
            </div>
            <div className="toolbar-actions">
              <button className="btn btn-outline" onClick={openPlanner} type="button"><Icon name="calculator" /> Tax planner</button>
              <button className="btn btn-outline" onClick={openUpload} type="button"><Icon name="receipt" /> Add receipts</button>
              <button className="btn btn-outline" disabled={!confirmed.length} onClick={exportCsv} type="button"><Icon name="download" /> Export CSV</button>
              <button className="btn btn-outline" disabled={!confirmed.length} onClick={generatePdf} type="button"><Icon name="file-down" /> Generate PDF</button>
            </div>
          </div>
          <section className="metric-grid" aria-label="Claim overview">
            <Metric label="Total claimable" value={fmt(claims.total)} note="Based on confirmed receipts" primary />
            <Metric label="Receipts saved" value={confirmed.length} note={`${visibleReceipts.length} visible`} />
            <Metric label="Categories used" value={claims.categories.length} note="Across claimed categories" />
            <Metric label="Review items" value={reviewTotal} note="Missing fields or duplicates" />
          </section>
          <section className="dashboard-tools">
            <input value={filters.query} onChange={e => setFilters({ ...filters, query: e.target.value })} type="search" placeholder="Search receipts" />
            <select value={filters.category} onChange={e => setFilters({ ...filters, category: e.target.value })}>
              <option value="">All categories</option>
              {TAX_RELIEF_CATEGORIES.map(cat => <option key={cat.key} value={cat.key}>{cat.label}</option>)}
            </select>
            <input value={filters.from} onChange={e => setFilters({ ...filters, from: e.target.value })} type="date" aria-label="From date" />
            <input value={filters.to} onChange={e => setFilters({ ...filters, to: e.target.value })} type="date" aria-label="To date" />
          </section>
          <div className="dashboard-grid">
            <ClaimPanel claims={claims} />
            <HistoryPanel receipts={visibleReceipts} total={confirmed.length} deleteReceipt={deleteReceipt} openPreview={openPreview} />
          </div>
          <section className="insight-grid">
            <LimitPanel categories={claims.categories} />
            <MonthlyPanel receipts={confirmed} />
            <ReviewPanel pendingReviewCount={pendingReviewCount} duplicates={duplicates} />
          </section>
          <AiPanel summary={summary} setChatOpen={setChatOpen} askAdvisor={askAdvisor} />
        </section>
      );
    }

    function Metric({ label, value, note, primary }) {
      return <article className={`metric-card ${primary ? 'primary' : ''}`}><span>{label}</span><strong>{value}</strong><small>{note}</small></article>;
    }

    function ClaimPanel({ claims }) {
      let start = 0;
      const segments = claims.categories.map(cat => {
        const end = start + (cat.claimable / (claims.total || 1)) * 100;
        const value = `${cat.color} ${start}% ${end}%`;
        start = end;
        return value;
      });
      return (
        <section className="panel claim-panel">
          <div className="donut-wrap">
            <div className="donut" style={{ background: claims.total ? `conic-gradient(${segments.join(', ')})` : '#E8EEF6' }} aria-label="Claim distribution chart">
              <div className="donut-hole"><span>Total claimed</span><strong>{fmt(claims.total)}</strong></div>
            </div>
            <div className="legend">
              {claims.categories.length ? claims.categories.map(cat => (
                <div className="legend-item" key={cat.key}>
                  <span className="swatch" style={{ background: cat.color }}></span>
                  <span>{cat.label}</span>
                  <strong>{fmt(cat.claimable)}</strong>
                </div>
              )) : <p className="empty">No claims yet.</p>}
            </div>
          </div>
        </section>
      );
    }

    function HistoryPanel({ receipts, total, deleteReceipt, openPreview }) {
      return (
        <aside className="panel history-panel">
          <div className="panel-title-row"><h2>Receipt History</h2><span>{receipts.length}/{total}</span></div>
          <div className="history-list">
            {receipts.length ? receipts.slice().reverse().map(r => {
              const cat = categoryByKey(r.categoryKey);
              return (
                <article className="history-item" key={r.id}>
                  {r.imageDataUrl ? <img src={r.imageDataUrl} alt="" onClick={() => openPreview(r.imageDataUrl)} /> : <div className="thumb-fallback"></div>}
                  <div><h3>{r.title}</h3><p>{cat ? cat.label : 'Uncategorized'} · {r.receiptDate}</p></div>
                  <strong>{fmt(r.amount)}</strong>
                  <button className="icon-btn" type="button" aria-label={`Delete ${r.title}`} onClick={() => deleteReceipt(r.id)}><Icon name="trash-2" size={15} /></button>
                </article>
              );
            }) : <p className="empty">No receipt history yet.</p>}
          </div>
        </aside>
      );
    }

    function LimitPanel({ categories }) {
      return (
        <article className="panel mini-panel">
          <div className="panel-title-row"><h2>Claim limits</h2></div>
          <div className="limit-list">
            {categories.length ? categories.map(cat => {
              const pct = cat.limit === Infinity ? 0 : Math.min(100, (cat.amount / cat.limit) * 100);
              const status = cat.limit === Infinity ? 'No fixed limit' : `${fmt(Math.max(0, cat.limit - cat.amount))} left`;
              return <div className="limit-item" key={cat.key}><div><strong>{cat.label}</strong><span>{status}</span></div><div className="meter"><span style={{ width: `${pct}%`, background: cat.color }}></span></div></div>;
            }) : <p className="empty">No claim limits yet.</p>}
          </div>
        </article>
      );
    }

    function MonthlyPanel({ receipts }) {
      const rows = [...receipts.reduce((map, r) => {
        const key = (r.receiptDate || '').slice(0, 7) || 'Undated';
        map.set(key, (map.get(key) || 0) + Number(r.amount || 0));
        return map;
      }, new Map()).entries()].sort((a, b) => b[0].localeCompare(a[0])).slice(0, 6);
      return <article className="panel mini-panel"><div className="panel-title-row"><h2>Monthly summary</h2></div><div className="month-list">{rows.length ? rows.map(([month, amount]) => <div className="stat-row" key={month}><span>{month}</span><strong>{fmt(amount)}</strong></div>) : <p className="empty">No monthly totals yet.</p>}</div></article>;
    }

    function ReviewPanel({ pendingReviewCount, duplicates }) {
      return (
        <article className="panel mini-panel">
          <div className="panel-title-row"><h2>Review queue</h2><span>{pendingReviewCount + duplicates.length}</span></div>
          <div className="review-list">
            {pendingReviewCount ? <div className="stat-row"><span>Pending uploads</span><strong>{pendingReviewCount} to check</strong></div> : null}
            {duplicates.map(group => <div className="stat-row" key={receiptFingerprint(group[0])}><span>{group[0].title || 'Receipt'}</span><strong>{group.length} duplicates</strong></div>)}
            {!pendingReviewCount && !duplicates.length ? <p className="empty">Nothing needs review.</p> : null}
          </div>
        </article>
      );
    }

    function AiPanel({ summary, setChatOpen, askAdvisor }) {
      const prompt = text => { setChatOpen(true); askAdvisor(text); };
      return (
        <section className="panel ai-panel">
          <div className="panel-title-row">
            <div><p className="eyebrow">Receipt timeline</p><h2>{summary.headline}</h2></div>
            <span className="cache-chip">{summary.status}</span>
          </div>
          <p className="ai-overview">{summary.overview}</p>
          <div className="quick-prompts">
            <button className="btn btn-outline btn-sm" type="button" onClick={() => prompt('What claim space do I still have?')}>Claim space</button>
            <button className="btn btn-outline btn-sm" type="button" onClick={() => prompt('Which receipts need review?')}>Needs review</button>
            <button className="btn btn-outline btn-sm" type="button" onClick={() => prompt('Which category is near the limit?')}>Near limits</button>
          </div>
          <div className="timeline">
            {summary.timeline.length ? summary.timeline.map((item, index) => <article className="timeline-item" key={`${item.date}-${index}`}><time>{item.date || ''}</time><div><h3>{item.title || 'Receipt'}</h3><p>{item.summary || ''}</p></div></article>) : <p className="empty">The timeline will appear after your first upload.</p>}
          </div>
        </section>
      );
    }

    function TaxPlanner({ annualIncome, setAnnualIncome, taxRebateAmount, setTaxRebateAmount, taxPlan, taxPlanStatus, showDashboard }) {
      const chargeableIncome = Math.max(0, Number(annualIncome || 0) - Number(taxPlan.total_claimed || 0));
      const estimatedTaxBeforeRebate = estimateResidentTax(chargeableIncome);
      const finalTaxPayable = Math.max(0, estimatedTaxBeforeRebate - Number(taxRebateAmount || 0));
      const claimedCategories = taxPlan.categories.filter(cat => Number(cat.claimable_amount || 0) > 0);

      return (
        <section className="dashboard-section">
          <div className="dashboard-head">
            <div>
              <p className="eyebrow">Tax planner</p>
              <h1>Income and rebate estimate</h1>
            </div>
            <div className="toolbar-actions">
              <button className="btn btn-outline" onClick={showDashboard} type="button"><Icon name="arrow-left" /> Back to dashboard</button>
            </div>
          </div>
          <section className="planner-grid">
            <section className="panel planner-form-panel">
              <div className="panel-title-row"><h2>Income and tax rebate</h2><span>{taxPlanStatus}</span></div>
              <div className="planner-input-grid">
                <div className="field">
                  <label>Annual income</label>
                  <input type="number" min="0" max={MAX_ANNUAL_INCOME} step="100" value={annualIncome || ''} onChange={e => setAnnualIncome(Math.min(parseFloat(e.target.value) || 0, MAX_ANNUAL_INCOME))} placeholder="0.00" />
                </div>
                <div className="field">
                  <label>Tax rebate amount</label>
                  <input type="number" min="0" step="50" value={taxRebateAmount || ''} onChange={e => setTaxRebateAmount(parseFloat(e.target.value) || 0)} placeholder="0.00" />
                </div>
              </div>
              <p className="helper-text">Tax rebate is deducted directly from the estimated tax payable after receipt claims are applied.</p>
            </section>

            <section className="panel planner-results-panel">
              <div className="panel-title-row"><h2>Estimated result</h2><span>{fmt(finalTaxPayable)}</span></div>
              <div className="planner-metrics">
                <Metric label="Receipt claims" value={fmt(taxPlan.total_claimed)} note="From saved receipt categories" primary />
                <Metric label="Chargeable income" value={fmt(chargeableIncome)} note="Income after claims" />
                <Metric label="Tax before rebate" value={fmt(estimatedTaxBeforeRebate)} note="Resident-rate estimate" />
                <Metric label="Final tax payable" value={fmt(finalTaxPayable)} note={`After ${fmt(taxRebateAmount || 0)} rebate`} />
              </div>
              <div className="claimed-category-list">
                {claimedCategories.length ? claimedCategories.map(cat => {
                  const source = categoryByKey(cat.category_key);
                  const hasLimit = Number.isFinite(Number(cat.limit));
                  const capLabel = hasLimit ? `${fmt(Math.max(0, Number(cat.remaining || 0)))} left` : 'No fixed limit';
                  return (
                    <article className="claimed-category-row" key={cat.category_key}>
                      <span className="swatch" style={{ background: source?.color || '#156F67' }}></span>
                      <div>
                        <strong>{cat.category_label}</strong>
                        <span>{capLabel}</span>
                      </div>
                      <strong>{fmt(cat.claimable_amount)}</strong>
                    </article>
                  );
                }) : <p className="empty">Save receipts to show claimed categories here.</p>}
              </div>
            </section>
          </section>
        </section>
      );
    }

    function UploadView({ pending, extractingIds, savingIds, savingAll, ocrEnabled, ocrConfig, setOcrEnabled, confirmed, updateReceipt, removePending, confirmReceipt, saveAllPending, rescanPendingReceipts, autoCategorizePendingReceipts, handleFiles, openPreview, showDashboard }) {
      const fileRef = useRef(null);
      const cameraRef = useRef(null);
      const [dragging, setDragging] = useState(false);
      const scanningAll = pending.length > 0 && pending.every(r => extractingIds.includes(r.id));
      const canRescan = pending.some(r => r.imageDataUrl && !extractingIds.includes(r.id));
      return (
        <section className="upload-section" style={{ display: 'block' }}>
          <div className="upload-head">
            <div><p className="eyebrow">Upload section</p><h2>Add receipts</h2></div>
            <button className="btn btn-outline" onClick={showDashboard} type="button">Back to dashboard</button>
          </div>
          <div className="upload-options">
            <label className="toggle-row">
              <input type="checkbox" checked={ocrEnabled && ocrConfig.enabled} disabled={!ocrConfig.enabled} onChange={e => setOcrEnabled(e.target.checked)} />
              <span className="toggle-switch"></span>
              <span>
                <strong>AI receipt extraction</strong>
                <small>{ocrEnabled && ocrConfig.enabled ? `${ocrConfig.label} reads uploaded receipts and pre-fills fields.` : 'Uploads stay manual. No OCR/AI call is made.'}</small>
              </span>
            </label>
          </div>
          <div className="capture-actions">
            <button className="btn btn-primary" onClick={() => cameraRef.current.click()} type="button"><Icon name="camera" /> Take photo</button>
            <button className="btn btn-outline" onClick={() => fileRef.current.click()} type="button"><Icon name="image-plus" /> Choose images</button>
          </div>
          <div
            className={`dropzone ${dragging ? 'dragover' : ''}`}
            onClick={() => fileRef.current.click()}
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
          >
            <Icon name="upload-cloud" size={28} />
            <strong>Add receipt images</strong>
            <span>PNG or JPG files</span>
          </div>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" hidden onChange={e => { handleFiles(e.target.files); e.target.value = ''; }} />
          <input ref={fileRef} type="file" accept=".png,.jpg,.jpeg,image/png,image/jpeg" multiple hidden onChange={e => { handleFiles(e.target.files); e.target.value = ''; }} />
          <div className="pending-list">
            {pending.length ? pending.map(r => (
              <PendingCard key={r.id} receipt={r} confirmed={confirmed} extracting={extractingIds.includes(r.id)} saving={savingIds.includes(r.id)} updateReceipt={updateReceipt} removePending={removePending} confirmReceipt={confirmReceipt} openPreview={openPreview} />
            )) : <p className="empty">All uploaded receipts are saved. Add more files or go back to the dashboard when you are done.</p>}
          </div>
          {pending.length ? <div className="pending-actions">
            <button className="btn btn-outline" disabled={!ocrEnabled || !ocrConfig.enabled || !canRescan || scanningAll} onClick={rescanPendingReceipts} type="button">{scanningAll ? 'Rescanning...' : 'Rescan receipts'}</button>
            <button className="btn btn-outline" onClick={autoCategorizePendingReceipts} type="button">Auto-categorize</button>
            <button className="btn btn-primary" disabled={savingAll} onClick={saveAllPending} type="button">{savingAll ? 'Saving all...' : 'Save all receipts'}</button>
          </div> : null}
        </section>
      );
    }

    function PendingCard({ receipt, confirmed, extracting, saving, updateReceipt, removePending, confirmReceipt, openPreview }) {
      const [categorySearch, setCategorySearch] = useState('');
      const selectedCategory = categoryByKey(receipt.categoryKey);
      const duplicate = Boolean(receipt.amount && receipt.categoryKey && receipt.receiptDate && confirmed.some(r => Number(r.amount || 0).toFixed(2) === Number(receipt.amount || 0).toFixed(2) && r.receiptDate === receipt.receiptDate && r.categoryKey === receipt.categoryKey));
      const amountInvalid = !receipt.amount || receipt.amount < MIN_RECEIPT_AMOUNT || receipt.amount > MAX_RECEIPT_AMOUNT;
      const categoryInvalid = !receipt.categoryKey;
      const extractionMessage = typeof receipt.extractionMessage === 'string' ? receipt.extractionMessage.trim() : '';
      const categoryMatches = TAX_RELIEF_CATEGORIES
        .map(cat => {
          const query = categorySearch.trim().toLowerCase();
          const keywordText = (cat.keywords || []).join(' ');
          const haystack = `${cat.label} ${cat.key} ${keywordText}`.toLowerCase();
          const selected = cat.key === receipt.categoryKey;
          const matches = !query || haystack.includes(query);
          return { cat, selected, matches, keywordText };
        })
        .filter(item => item.matches || item.selected)
        .sort((a, b) => Number(b.selected) - Number(a.selected) || a.cat.label.localeCompare(b.cat.label))
        .slice(0, 8);
      return (
        <article className={`receipt-card ${receipt.needsReview || duplicate ? 'has-warning' : ''} ${amountInvalid || categoryInvalid ? 'has-error' : ''}`} data-pending-card={receipt.id}>
          <img className="receipt-thumb" src={receipt.imageDataUrl} alt="" onClick={() => openPreview(receipt.imageDataUrl)} />
          <div className="receipt-fields">
            {extracting ? <p className="receipt-note">Reading receipt...</p> : null}
            {extractionMessage ? <p className="receipt-note warning">{extractionMessage}</p> : null}
            {duplicate ? <p className="receipt-note warning">Possible duplicate receipt.</p> : null}
            {receipt.needsReview ? <p className="receipt-note warning">Review suggested before saving.</p> : null}
            {Number(receipt.amount || 0) > 0 && receipt.amount < MIN_RECEIPT_AMOUNT ? <p className="receipt-note warning">Amount must be at least RM 0.01.</p> : null}
            {receipt.amount > MAX_RECEIPT_AMOUNT ? <p className="receipt-note warning">Amount must be {fmt(MAX_RECEIPT_AMOUNT)} or less.</p> : null}
            <div className="field-grid">
              <div className="field"><label>Title</label><input value={receipt.title || ''} onChange={e => {
                const title = e.target.value;
                updateReceipt(receipt.id, {
                  title,
                  categoryKey: receipt.categoryKey || guessCategoryKey(`${title} ${receipt.filename || ''}`),
                });
              }} placeholder="Optional" /></div>
              <div className="field"><label>Date</label><input value={receipt.receiptDate || ''} onChange={e => updateReceipt(receipt.id, { receiptDate: e.target.value })} type="date" /></div>
              <div className="field"><label>Amount</label><input className={amountInvalid ? 'input-error' : ''} value={receipt.amount || ''} onChange={e => updateReceipt(receipt.id, { amount: parseFloat(e.target.value) || 0 })} type="number" min={MIN_RECEIPT_AMOUNT} max={MAX_RECEIPT_AMOUNT} step="0.01" placeholder="0.00" /></div>
              <div className="field category-field">
                <label>Category</label>
                <div className={`category-picker ${categoryInvalid ? 'input-error' : ''}`}>
                  <div className="category-selected">
                    <span className="swatch" style={{ background: selectedCategory?.color || '#BAC6D6' }}></span>
                    <div>
                      <strong>{selectedCategory ? selectedCategory.label : 'Select category'}</strong>
                      <span>{selectedCategory ? (selectedCategory.limit === Infinity ? 'No limit' : `${fmt(selectedCategory.limit)} limit`) : 'Search by name or receipt keyword'}</span>
                    </div>
                  </div>
                  <input value={categorySearch} onChange={e => setCategorySearch(e.target.value)} placeholder="Search categories" aria-label="Search receipt categories" />
                  <div className="category-options">
                    {categoryMatches.length ? categoryMatches.map(({ cat, selected, keywordText }) => (
                      <button className={`category-option ${selected ? 'active' : ''}`} key={cat.key} type="button" onClick={() => { updateReceipt(receipt.id, { categoryKey: cat.key }); setCategorySearch(''); }}>
                        <span className="swatch" style={{ background: cat.color || '#416D94' }}></span>
                        <span>
                          <strong>{cat.label}</strong>
                          <small>{cat.limit === Infinity ? 'No limit' : `${fmt(cat.limit)} limit`}{keywordText ? ` · ${keywordText.split(' ').slice(0, 4).join(' ')}` : ''}</small>
                        </span>
                      </button>
                    )) : <p className="category-empty">No category found.</p>}
                  </div>
                </div>
              </div>
            </div>
            <div className="action-row">
              <button className="btn btn-outline btn-sm" onClick={() => openPreview(receipt.imageDataUrl)} type="button">View receipt</button>
              <button className="btn btn-primary btn-sm" disabled={saving} onClick={() => confirmReceipt(receipt.id)} type="button">{saving ? 'Saving...' : 'Save receipt'}</button>
              <button className="btn btn-danger btn-sm" onClick={() => removePending(receipt.id)} type="button">Remove</button>
            </div>
          </div>
        </article>
      );
    }

    function AdvisorChat({ open, setOpen, messages, busy, onAsk }) {
      const [value, setValue] = useState('');
      const listRef = useRef(null);
      useEffect(() => { if (listRef.current) listRef.current.scrollTop = listRef.current.scrollHeight; }, [messages, open]);
      function submit(e) {
        e.preventDefault();
        const text = value.trim();
        if (!text || busy) return;
        setValue('');
        onAsk(text);
      }
      return (
        <section className="advisor-chat" style={{ display: 'flex' }} aria-label="Personal finance advisor chat">
          <button className="advisor-bubble" onClick={() => setOpen(!open)} type="button" aria-label="Open AI advisor">AI</button>
          <div className={`advisor-box ${open ? 'open' : ''}`}>
            <div className="advisor-head"><div><p className="eyebrow">AI advisor</p><h2>Personal finance helper</h2></div><button className="icon-btn" onClick={() => setOpen(false)} type="button" aria-label="Close AI advisor"><Icon name="x" size={16} /></button></div>
            <div className="advisor-messages" ref={listRef} aria-live="polite">{messages.map((msg, index) => <p key={index} className={`advisor-msg ${msg.type}`}>{msg.text}</p>)}</div>
            <form className="advisor-form" onSubmit={submit}>
              <input value={value} onChange={e => setValue(e.target.value)} disabled={busy} autoComplete="off" placeholder="Ask about your claims..." />
              <button className="btn btn-primary btn-sm" disabled={busy} type="submit">{busy ? 'Thinking...' : 'Send'}</button>
            </form>
          </div>
        </section>
      );
    }

    function ImageModal({ src, close }) {
      return <div className="image-modal open" onClick={e => { if (e.target === e.currentTarget) close(); }} aria-hidden="false"><button className="icon-btn" onClick={close} type="button" aria-label="Close image preview"><Icon name="x" size={16} /></button><img src={src} alt="" /></div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    {% endraw %}
  </script>
</body>
</html>
