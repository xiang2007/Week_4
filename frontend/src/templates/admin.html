<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Manager Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #F5F2E8;
      --paper-dim: #EDE8D9;
      --line: #D9D2BC;
      --ink: #1A1A1F;
      --ink-soft: #5C5748;
      --ink-faint: #8A8571;
      --stamp: #C4432B;
      --stamp-dark: #9E3220;
      --mint: #2F7A5C;
      --card: #FFFFFF;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-body: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      background-image: radial-gradient(circle at 1px 1px, rgba(26,26,31,0.05) 1px, transparent 0);
      background-size: 22px 22px;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 1.5rem;
      background: rgba(245,242,232,0.92);
      border-bottom: 1.5px dashed var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--ink);
      text-decoration: none;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .mark {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      color: var(--paper);
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      transform: rotate(-4deg);
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .panel {
      background: var(--card);
      border: 1.5px solid var(--line);
      border-radius: 1rem;
      box-shadow: 0 24px 48px -18px rgba(26,26,31,0.24);
      padding: 2rem;
    }

    .login-panel {
      max-width: 480px;
      margin: 2rem auto 0;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.9rem;
      line-height: 1.15;
      margin-bottom: 0.45rem;
    }

    .subtitle {
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
    }

    label {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      padding: 0.78rem 0.9rem;
      border: 1.5px solid var(--line);
      border-radius: 0.6rem;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--stamp);
      box-shadow: 0 0 0 3px rgba(196, 67, 43, 0.12);
    }

    .btn {
      border: 0;
      border-radius: 0.6rem;
      padding: 0.78rem 1.25rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      box-shadow: 3px 3px 0 var(--stamp);
    }

    .btn-outline {
      background: transparent;
      color: var(--ink);
      border: 1.5px solid var(--ink);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      display: none;
      margin: 0.25rem 0 1rem;
      padding: 0.75rem 0.85rem;
      background: #FBEAE6;
      color: var(--stamp-dark);
      border: 1.5px solid #F0C4B8;
      border-radius: 0.6rem;
      font-size: 0.9rem;
    }

    .admin-shell { display: none; }
    body.admin-authenticated .login-panel { display: none; }
    body.admin-authenticated .admin-shell { display: block; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .count {
      font-family: var(--font-mono);
      color: var(--ink-soft);
      font-size: 0.85rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1.5px solid var(--line);
      border-radius: 0.85rem;
    }

    .reset-panel {
      display: none;
      margin-bottom: 1.25rem;
      padding: 1rem;
      background: var(--paper-dim);
      border: 1.5px solid var(--line);
      border-radius: 0.85rem;
    }

    .reset-panel.active {
      display: block;
    }

    .reset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.85rem;
      align-items: end;
    }

    .status {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border-radius: 0.6rem;
      font-size: 0.9rem;
    }

    .status.success {
      display: block;
      background: #EAF4EE;
      color: #24614A;
      border: 1.5px solid #BFE3CD;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th, td {
      text-align: left;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    th {
      background: var(--paper-dim);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    tr:last-child td { border-bottom: 0; }

    .mono {
      font-family: var(--font-mono);
      font-size: 0.86rem;
    }

    .password-note {
      color: var(--ink-faint);
      font-size: 0.88rem;
    }

    @media (max-width: 760px) {
      .reset-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .panel { padding: 1.35rem; }
      h1 { font-size: 1.55rem; }
      .navbar { align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/">
      <span class="mark">RM</span>
      Receipt Manager Admin
    </a>
    <a class="btn btn-outline" href="/app">Back to app</a>
  </nav>

  <main class="wrap">
    <section class="panel login-panel">
      <h1>Admin Login</h1>
      <p class="subtitle">Use the admin account to view registered accounts.</p>
      <form id="admin-login-form">
        <div class="field">
          <label for="admin-account">Account name</label>
          <input id="admin-account" name="accountName" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="admin-password">Password</label>
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="error" id="admin-error"></div>
        <button class="btn btn-primary" id="admin-submit" type="submit">Login</button>
      </form>
    </section>

    <section class="panel admin-shell">
      <div class="toolbar">
        <div>
          <h1>Accounts</h1>
          <div class="count" id="account-count">Loading accounts...</div>
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-outline" id="refresh-btn" type="button">Refresh</button>
          <button class="btn btn-outline" id="logout-btn" type="button">Logout</button>
        </div>
      </div>

      <div class="status" id="admin-status"></div>

      <div class="reset-panel" id="reset-panel">
        <p class="subtitle">Reset password for the selected account.</p>
        <form id="reset-form">
          <div class="reset-grid">
            <div class="field">
              <label for="reset-account">Account name</label>
              <input id="reset-account" name="accountName" readonly required>
            </div>
            <div class="field">
              <label for="reset-password-input">New password</label>
              <input id="reset-password-input" name="newPassword" type="password" minlength="6" required>
            </div>
            <button class="btn btn-primary" id="reset-submit" type="submit">Update Password</button>
          </div>
        </form>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Account Name</th>
              <th>Password</th>
              <th>Created At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="accounts-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const state = {
      token: localStorage.getItem('receiptManagerAdminToken') || '',
    };

    const form = document.getElementById('admin-login-form');
    const accountInput = document.getElementById('admin-account');
    const passwordInput = document.getElementById('admin-password');
    const submitBtn = document.getElementById('admin-submit');
    const errorEl = document.getElementById('admin-error');
    const statusEl = document.getElementById('admin-status');
    const accountsBody = document.getElementById('accounts-body');
    const accountCount = document.getElementById('account-count');
    const refreshBtn = document.getElementById('refresh-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const resetPanel = document.getElementById('reset-panel');
    const resetForm = document.getElementById('reset-form');
    const resetAccountInput = document.getElementById('reset-account');
    const resetPasswordInput = document.getElementById('reset-password-input');
    const resetSubmit = document.getElementById('reset-submit');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }

    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.className = 'status success';
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    function setAuthenticated(token) {
      state.token = token;
      localStorage.setItem('receiptManagerAdminToken', token);
      document.body.classList.add('admin-authenticated');
    }

    function clearAuthenticated() {
      state.token = '';
      localStorage.removeItem('receiptManagerAdminToken');
      document.body.classList.remove('admin-authenticated');
      accountsBody.innerHTML = '';
      accountCount.textContent = 'Login required';
      passwordInput.value = '';
      resetForm.reset();
      resetPanel.classList.remove('active');
      clearStatus();
    }

    function openResetPanel(accountName) {
      clearError();
      clearStatus();
      resetAccountInput.value = accountName;
      resetPasswordInput.value = '';
      resetPanel.classList.add('active');
      resetPasswordInput.focus();
    }

    function renderAccounts(accounts) {
      accountsBody.innerHTML = '';
      accountCount.textContent = `${accounts.length} account(s)`;

      if (accounts.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="4" class="password-note">No accounts found.</td>';
        accountsBody.appendChild(row);
        return;
      }

      for (const account of accounts) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="mono">${account.account_name}</td>
          <td class="password-note">${account.password}</td>
          <td class="mono">${account.created_at}</td>
          <td><button class="btn btn-outline" type="button" data-account-name="${account.account_name}">Reset Password</button></td>
        `;
        accountsBody.appendChild(row);
        row.querySelector('[data-account-name]').addEventListener('click', () => openResetPanel(account.account_name));
      }
    }

    async function loadAccounts() {
      accountCount.textContent = 'Loading accounts...';
      const resp = await fetch('/admin/accounts', {
        headers: { 'Authorization': `Bearer ${state.token}` },
      });
      const data = await resp.json();

      if (!resp.ok) {
        throw new Error(data.detail || `Server responded with ${resp.status}`);
      }

      renderAccounts(data.accounts);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const resp = await fetch('/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            accountName: accountInput.value,
            password: passwordInput.value,
          }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || 'Admin login failed');
        }

        setAuthenticated(data.token);
        passwordInput.value = '';
        await loadAccounts();
      } catch (err) {
        showError(err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });

    refreshBtn.addEventListener('click', async () => {
      refreshBtn.disabled = true;
      try {
        clearStatus();
        await loadAccounts();
      } catch (err) {
        clearAuthenticated();
        showError(err.message);
      } finally {
        refreshBtn.disabled = false;
      }
    });

    logoutBtn.addEventListener('click', clearAuthenticated);

    resetForm.addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      clearStatus();
      resetSubmit.disabled = true;
      resetSubmit.textContent = 'Updating...';

      try {
        const resp = await fetch('/admin/accounts/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${state.token}`,
          },
          body: JSON.stringify({
            accountName: resetAccountInput.value,
            newPassword: resetPasswordInput.value,
          }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || 'Password reset failed');
        }

        resetPasswordInput.value = '';
        showStatus(`Password updated for ${data.account_name}.`);
      } catch (err) {
        showError(err.message);
      } finally {
        resetSubmit.disabled = false;
        resetSubmit.textContent = 'Update Password';
      }
    });

    if (state.token) {
      setAuthenticated(state.token);
      loadAccounts().catch(() => clearAuthenticated());
    }
  </script>
</body>
</html>
