<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Manager Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F6F8FB;
      --surface: #FFFFFF;
      --surface-soft: #F1F5F9;
      --surface-strong: #E8EEF6;
      --line: #D7DEE9;
      --line-strong: #BAC6D6;
      --ink: #142033;
      --ink-soft: #526070;
      --ink-faint: #8390A1;
      --brand: #156F67;
      --brand-dark: #0E5550;
      --brand-soft: #DFF3EF;
      --danger: #C2413A;
      --danger-soft: #FDECEA;
      --success: #207A4D;
      --success-soft: #E6F5ED;
      --card: #FFFFFF;
      --font-display: 'Space Grotesk', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-body: 'Inter', sans-serif;
      --shadow-sm: 0 1px 2px rgba(20, 32, 51, 0.06), 0 8px 24px rgba(20, 32, 51, 0.05);
      --shadow-md: 0 24px 60px rgba(20, 32, 51, 0.12);
      --radius: 8px;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      background:
        linear-gradient(180deg, #FFFFFF 0, var(--bg) 260px),
        var(--bg);
      color: var(--ink);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      min-height: 72px;
      padding: 0.9rem clamp(1rem, 3vw, 2rem);
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      color: var(--ink);
      text-decoration: none;
      font-family: var(--font-display);
      font-weight: 700;
    }

    .mark {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--brand);
      color: #fff;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,0.08);
    }

    .wrap {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 2rem;
    }

    .login-panel {
      max-width: 480px;
      margin: 2rem auto 0;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.9rem;
      line-height: 1.15;
      margin-bottom: 0.45rem;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
      line-height: 1.55;
    }

    .field {
      display: grid;
      gap: 0.35rem;
      margin-bottom: 0.9rem;
    }

    label {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input {
      width: 100%;
      padding: 0.78rem 0.9rem;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(21, 111, 103, 0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0.78rem 1.25rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
      box-shadow: 0 10px 22px rgba(21, 111, 103, 0.18);
    }

    .btn-primary:hover {
      background: var(--brand-dark);
    }

    .btn-outline {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--line-strong);
      box-shadow: 0 1px 1px rgba(20, 32, 51, 0.03);
    }

    .btn-outline:hover {
      border-color: var(--brand);
      color: var(--brand-dark);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }

    .error {
      display: none;
      margin: 0.25rem 0 1rem;
      padding: 0.75rem 0.85rem;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #F2BAB5;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }

    .admin-shell { display: none; }
    body.admin-authenticated .login-panel { display: none; }
    body.admin-authenticated .admin-shell { display: block; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .insight-card {
      padding: 1rem;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .insight-card span {
      display: block;
      margin-bottom: 0.35rem;
      color: var(--ink-soft);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .insight-card strong {
      font-family: var(--font-display);
      font-size: 1.4rem;
    }

    .count {
      font-family: var(--font-mono);
      color: var(--ink-soft);
      font-size: 0.85rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    .reset-panel {
      display: none;
      margin-bottom: 1.25rem;
      padding: 1rem;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .reset-panel.active {
      display: block;
    }

    .reset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.85rem;
      align-items: end;
    }

    .status {
      display: none;
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border-radius: 0.6rem;
      font-size: 0.9rem;
    }

    .status.success {
      display: block;
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #BBDDCB;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: #fff;
    }

    th, td {
      text-align: left;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }

    th {
      background: var(--surface-soft);
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--ink-soft);
      text-transform: uppercase;
    }

    tr:last-child td { border-bottom: 0; }

    .mono {
      font-family: var(--font-mono);
      font-size: 0.86rem;
    }

    .password-note {
      color: var(--ink-faint);
      font-size: 0.88rem;
    }

    @media (max-width: 760px) {
      .insight-grid,
      .reset-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .panel { padding: 1.35rem; }
      h1 { font-size: 1.55rem; }
      .navbar { align-items: flex-start; gap: 1rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/">
      <span class="mark">RM</span>
      Receipt Manager Admin
    </a>
    <a class="btn btn-outline" href="/app">Back to app</a>
  </nav>

  <main class="wrap">
    <section class="panel login-panel">
      <h1>Admin Login</h1>
      <p class="subtitle">Use the admin account to view registered accounts.</p>
      <form id="admin-login-form">
        <div class="field">
          <label for="admin-account">Account name</label>
          <input id="admin-account" name="accountName" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="admin-password">Password</label>
          <input id="admin-password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="error" id="admin-error"></div>
        <button class="btn btn-primary" id="admin-submit" type="submit">Login</button>
      </form>
    </section>

    <section class="panel admin-shell">
      <div class="toolbar">
        <div>
          <h1>Accounts</h1>
          <div class="count" id="account-count">Loading accounts...</div>
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-outline" id="refresh-btn" type="button">Refresh</button>
          <button class="btn btn-outline" id="logout-btn" type="button">Logout</button>
        </div>
      </div>

      <div class="status" id="admin-status"></div>

      <div class="insight-grid" id="admin-insights">
        <div class="insight-card"><span>Accounts</span><strong id="insight-accounts">0</strong></div>
        <div class="insight-card"><span>Receipts</span><strong id="insight-receipts">0</strong></div>
        <div class="insight-card"><span>Latest upload</span><strong id="insight-latest">-</strong></div>
        <div class="insight-card"><span>Top category</span><strong id="insight-category">-</strong></div>
      </div>

      <div class="reset-panel" id="reset-panel">
        <p class="subtitle">Reset password for the selected account.</p>
        <form id="reset-form">
          <div class="reset-grid">
            <div class="field">
              <label for="reset-account">Account name</label>
              <input id="reset-account" name="accountName" readonly required>
            </div>
            <div class="field">
              <label for="reset-password-input">New password</label>
              <input id="reset-password-input" name="newPassword" type="password" minlength="6" required>
            </div>
            <button class="btn btn-primary" id="reset-submit" type="submit">Update Password</button>
          </div>
        </form>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Account Name</th>
              <th>Password</th>
              <th>Created At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="accounts-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const state = {
      authenticated: false,
    };

    const form = document.getElementById('admin-login-form');
    const accountInput = document.getElementById('admin-account');
    const passwordInput = document.getElementById('admin-password');
    const submitBtn = document.getElementById('admin-submit');
    const errorEl = document.getElementById('admin-error');
    const statusEl = document.getElementById('admin-status');
    const accountsBody = document.getElementById('accounts-body');
    const accountCount = document.getElementById('account-count');
    const refreshBtn = document.getElementById('refresh-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const resetPanel = document.getElementById('reset-panel');
    const resetForm = document.getElementById('reset-form');
    const resetAccountInput = document.getElementById('reset-account');
    const resetPasswordInput = document.getElementById('reset-password-input');
    const resetSubmit = document.getElementById('reset-submit');
    const insightAccounts = document.getElementById('insight-accounts');
    const insightReceipts = document.getElementById('insight-receipts');
    const insightLatest = document.getElementById('insight-latest');
    const insightCategory = document.getElementById('insight-category');

    function showError(message) {
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function clearError() {
      errorEl.textContent = '';
      errorEl.style.display = 'none';
    }

    function showStatus(message) {
      statusEl.textContent = message;
      statusEl.className = 'status success';
    }

    function clearStatus() {
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    function setAuthenticated() {
      state.authenticated = true;
      document.body.classList.add('admin-authenticated');
    }

    async function clearAuthenticated() {
      try {
        await fetch('/admin/auth/logout', { method: 'POST' });
      } catch {}
      state.authenticated = false;
      document.body.classList.remove('admin-authenticated');
      accountsBody.innerHTML = '';
      accountCount.textContent = 'Login required';
      passwordInput.value = '';
      resetForm.reset();
      resetPanel.classList.remove('active');
      clearStatus();
    }

    function openResetPanel(accountName) {
      clearError();
      clearStatus();
      resetAccountInput.value = accountName;
      resetPasswordInput.value = '';
      resetPanel.classList.add('active');
      resetPasswordInput.focus();
    }

    function renderAccounts(accounts) {
      accountsBody.innerHTML = '';
      accountCount.textContent = `${accounts.length} account(s)`;

      if (accounts.length === 0) {
        const row = document.createElement('tr');
        row.innerHTML = '<td colspan="4" class="password-note">No accounts found.</td>';
        accountsBody.appendChild(row);
        return;
      }

      for (const account of accounts) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="mono">${account.account_name}</td>
          <td class="password-note">${account.password}</td>
          <td class="mono">${account.created_at}</td>
          <td><button class="btn btn-outline" type="button" data-account-name="${account.account_name}">Reset Password</button></td>
        `;
        accountsBody.appendChild(row);
        row.querySelector('[data-account-name]').addEventListener('click', () => openResetPanel(account.account_name));
      }
    }

    async function loadAccounts() {
      accountCount.textContent = 'Loading accounts...';
      const [accountsResp, insightsResp] = await Promise.all([
        fetch('/admin/accounts'),
        fetch('/admin/insights'),
      ]);
      const data = await accountsResp.json();

      if (!accountsResp.ok) {
        throw new Error(data.detail || `Server responded with ${accountsResp.status}`);
      }

      renderAccounts(data.accounts);
      if (insightsResp.ok) {
        const insights = await insightsResp.json();
        insightAccounts.textContent = String(insights.account_count || 0);
        insightReceipts.textContent = String(insights.receipt_count || 0);
        insightLatest.textContent = insights.newest_upload ? insights.newest_upload.slice(0, 10) : '-';
        insightCategory.textContent = (insights.top_categories || [])[0]?.category || '-';
      }
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Logging in...';

      try {
        const resp = await fetch('/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            accountName: accountInput.value,
            password: passwordInput.value,
          }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || 'Admin login failed');
        }

        setAuthenticated();
        passwordInput.value = '';
        await loadAccounts();
      } catch (err) {
        showError(err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
      }
    });

    refreshBtn.addEventListener('click', async () => {
      refreshBtn.disabled = true;
      try {
        clearStatus();
        await loadAccounts();
      } catch (err) {
        clearAuthenticated();
        showError(err.message);
      } finally {
        refreshBtn.disabled = false;
      }
    });

    logoutBtn.addEventListener('click', () => {
      clearAuthenticated();
    });

    resetForm.addEventListener('submit', async e => {
      e.preventDefault();
      clearError();
      clearStatus();
      resetSubmit.disabled = true;
      resetSubmit.textContent = 'Updating...';

      try {
        const resp = await fetch('/admin/accounts/reset-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            accountName: resetAccountInput.value,
            newPassword: resetPasswordInput.value,
          }),
        });
        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || 'Password reset failed');
        }

        resetPasswordInput.value = '';
        showStatus(`Password updated for ${data.account_name}.`);
      } catch (err) {
        showError(err.message);
      } finally {
        resetSubmit.disabled = false;
        resetSubmit.textContent = 'Update Password';
      }
    });

    async function restoreAdminSession() {
      try {
        const resp = await fetch('/admin/auth/me');
        if (!resp.ok) throw new Error('Admin login required');
        setAuthenticated();
        await loadAccounts();
      } catch {
        await clearAuthenticated();
      }
    }

    restoreAdminSession();
  </script>
</body>
</html>
